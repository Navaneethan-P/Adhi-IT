<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhi-IT Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f7ff;
      --sidebar-bg: #ffffff;
      --card: #ffffff;
      --topbar-bg: #ffffff;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --accent-muted: #e0f2fe;
      --accent-text: #0369a1;
      --success: #059669;
      --success-bg: #ecfdf5;
      --success-border: #a7f3d0;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --warning: #d97706;
      --warning-bg: #fffbeb;
      --warning-border: #fde68a;
      --border: #dbeafe;
      --border2: #e2e8f0;
      --text1: #0f172a;
      --text2: #1e293b;
      --text3: #475569;
      --text4: #94a3b8;
      --radius: 10px;
      --radius-lg: 14px;
      --sidebar-w: 235px;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.07), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow: 0 4px 12px rgba(14, 165, 233, 0.08), 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      display: flex;
      font-size: 14px;
    }

    /* ─── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
      box-shadow: 2px 0 8px rgba(14, 165, 233, 0.06);
    }

    .sidebar-logo {
      padding: 18px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .sidebar-logo-icon svg { width: 20px; height: 20px; color: white; }

    .sidebar-logo-text h1 {
      font-size: 15px; font-weight: 800;
      color: var(--text1); line-height: 1.1;
    }

    .sidebar-logo-text p { font-size: 11px; color: var(--text3); margin-top: 1px; }

    .sidebar-nav { flex: 1; padding: 10px 8px; overflow-y: auto; }

    .nav-section {
      font-size: 10px; font-weight: 700;
      letter-spacing: .09em; color: var(--text4);
      padding: 14px 8px 5px;
      text-transform: uppercase;
    }

    .nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 10px; border-radius: 8px;
      cursor: pointer; color: var(--text3);
      font-size: 13px; font-weight: 500;
      transition: all .15s; border: none;
      background: none; width: 100%; text-align: left;
    }

    .nav-item:hover { background: var(--accent-muted); color: var(--accent-dark); }

    .nav-item.active {
      background: var(--accent-muted);
      color: var(--accent-dark);
      font-weight: 600;
    }

    .nav-item.active .nav-dot {
      width: 3px; height: 18px;
      background: var(--accent);
      border-radius: 2px;
      position: absolute; left: 8px;
    }

    .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .8; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text4);
      text-align: center;
    }

    /* ─── Main area ───────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1; display: flex;
      flex-direction: column; min-height: 100vh;
    }

    .topbar {
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex; align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 4px rgba(14, 165, 233, 0.06);
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }

    .topbar-title { font-size: 16px; font-weight: 700; color: var(--text1); }
    .topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

    .db-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      border: 1px solid;
    }

    .db-badge.turso {
      background: var(--success-bg);
      color: var(--success);
      border-color: var(--success-border);
    }

    .db-badge.local {
      background: var(--warning-bg);
      color: var(--warning);
      border-color: var(--warning-border);
    }

    .db-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .content { padding: 24px; flex: 1; }

    /* ─── Cards ───────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    .card-title {
      font-size: 14px; font-weight: 700;
      margin-bottom: 16px; color: var(--text1);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px; margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: 4px;
    }

    .stat-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--accent-muted);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }

    .stat-icon svg { width: 17px; height: 17px; color: var(--accent); }

    .stat-val {
      font-size: 26px; font-weight: 800;
      color: var(--text1); line-height: 1;
    }

    .stat-label { font-size: 12px; color: var(--text3); margin-top: 2px; }

    /* ─── Tables ──────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left; padding: 10px 12px;
      font-size: 11px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--text3); background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border2);
      font-size: 13px; color: var(--text2);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fbff; }

    /* ─── Badges ──────────────────────────────────── */
    .badge {
      display: inline-block; padding: 2px 8px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }

    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-green { background: var(--success-bg); color: var(--success); }
    .badge-red { background: var(--danger-bg); color: var(--danger); }
    .badge-yellow { background: var(--warning-bg); color: var(--warning); }
    .badge-gray { background: #f1f5f9; color: var(--text3); }
    .badge-sky { background: var(--accent-muted); color: var(--accent-dark); }

    /* ─── Forms ───────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .form-group { display: flex; flex-direction: column; gap: 5px; }

    label { font-size: 12px; font-weight: 600; color: var(--text2); }

    input, select, textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text1);
      font-size: 13px; outline: none;
      width: 100%; transition: border-color .15s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.12);
    }

    textarea { resize: vertical; min-height: 80px; }

    .search-wrap {
      position: relative; margin-bottom: 16px;
    }

    .search-wrap svg {
      position: absolute; left: 10px;
      top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--text4);
    }

    .search-wrap input { padding-left: 32px; }

    /* ─── Buttons ─────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      transition: all .15s; font-family: inherit;
      white-space: nowrap;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-dark); }

    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #047857; }

    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #b91c1c; }

    .btn-ghost {
      background: white; color: var(--text2);
      border: 1.5px solid var(--border2);
    }

    .btn-ghost:hover { background: var(--bg); border-color: var(--accent); color: var(--accent-dark); }

    .btn-warning { background: var(--warning); color: white; }
    .btn-warning:hover { background: #b45309; }

    .btn-publish {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: white; padding: 8px 18px;
      box-shadow: 0 2px 6px rgba(14, 165, 233, 0.35);
    }

    .btn-publish:hover {
      background: linear-gradient(135deg, #0284c7, #0369a1);
      box-shadow: 0 3px 10px rgba(14, 165, 233, 0.45);
      transform: translateY(-1px);
    }

    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .btn:disabled { opacity: .55; cursor: not-allowed; pointer-events: none; }

    /* ─── Section header ──────────────────────────── */
    .section-hd {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-hd h2 { font-size: 16px; font-weight: 700; }
    .section-hd-right { display: flex; gap: 8px; align-items: center; }

    /* ─── Toast ───────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      z-index: 9999; display: flex;
      flex-direction: column; gap: 8px;
    }

    .toast-item {
      background: white;
      border: 1px solid var(--border);
      border-left: 4px solid var(--success);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      box-shadow: var(--shadow);
      animation: slideIn .2s ease;
      max-width: 320px;
      color: var(--text1);
    }

    .toast-item.err { border-left-color: var(--danger); }
    .toast-item.warn { border-left-color: var(--warning); }

    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ─── Modal ───────────────────────────────────── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(2px);
      z-index: 500;
      display: flex; align-items: center;
      justify-content: center; padding: 20px;
    }

    .modal {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px; width: 100%;
      max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalIn .2s ease;
    }

    .modal-lg { max-width: 720px; }

    @keyframes modalIn {
      from { transform: translateY(12px) scale(.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; color: var(--text1); }

    .modal-actions {
      display: flex; gap: 10px;
      justify-content: flex-end; margin-top: 20px;
    }

    /* ─── Tabs ────────────────────────────────────── */
    .tabs {
      display: flex; gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
      margin-bottom: 16px; flex-wrap: wrap;
    }

    .tab {
      padding: 6px 16px; border-radius: 7px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; color: var(--text3);
      border: none; background: none;
      transition: all .15s; font-family: inherit;
    }

    .tab.active { background: var(--accent); color: white; }
    .tab:not(.active):hover { background: var(--accent-muted); color: var(--accent-dark); }

    /* ─── Misc utilities ──────────────────────────── */
    .hidden { display: none !important; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .fw-6 { font-weight: 600; }
    .fw-7 { font-weight: 700; }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }
    .text-warn { color: var(--warning); }
    .text-muted { color: var(--text3); }
    .text-accent { color: var(--accent-dark); }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }

    .info-box {
      background: var(--accent-muted);
      border: 1px solid #bae6fd;
      border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: var(--accent-text);
    }

    .warn-box {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: var(--warning);
    }

    /* Period timetable grid */
    .tt-day-row { margin-bottom: 14px; }
    .tt-day-label {
      font-weight: 700; font-size: 13px;
      color: var(--text2); margin-bottom: 6px;
    }

    .tt-periods-grid {
      display: grid; gap: 6px;
    }

    .tt-period-cell { display: flex; flex-direction: column; gap: 3px; }
    .tt-period-label { font-size: 10px; color: var(--text4); font-weight: 600; }

    /* Publish modal steps */
    .deploy-step {
      display: flex; align-items: center; gap: 10px;
      padding: 12px; border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 10px; font-size: 13px;
    }

    .step-icon {
      width: 28px; height: 28px;
      border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }

    .step-pending { background: var(--bg); color: var(--text4); border: 1px solid var(--border); }
    .step-running { background: var(--accent-muted); color: var(--accent); }
    .step-done { background: var(--success-bg); color: var(--success); }
    .step-error { background: var(--danger-bg); color: var(--danger); }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(14,165,233,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <!-- Sidebar -->

    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

      <button class="nav-item" onclick="showSection('settings')" id="nav-settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>

    <div class="sidebar-footer">
      Adhi College of Engineering<br>IT Department
    </div>

  <!-- Main Content -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div>
          <div class="topbar-title" id="topbar-title">Dashboard</div>
          <div class="topbar-sub">Adhi College of Engineering &mdash; IT Department</div>
        </div>
        <div id="db-badge" class="db-badge local" style="display:none">
          <div class="db-badge-dot"></div>
          <span id="db-badge-text">Local DB</span>
        </div>
      </div>
      <div class="topbar-right">
        <a href="https://adhi-it.onrender.com" target="_blank" class="btn btn-ghost btn-sm">View Live App</a>
        <button class="btn btn-publish btn-sm" onclick="publishToLive()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Publish to Live
        </button>
      </div>
    </div>

    <div class="content" id="content">
      <div style="color:var(--text3);padding:60px;text-align:center">Loading...</div>
    </div>
  </main>

  <div id="toast"></div>
  <div id="modal-container"></div>

  <script>
    const API = 'http://localhost:3001';
    const RENDER_HOOK_KEY = 'campusos_render_hook';
    const sections = {};
    let currentSection = 'dashboard';

    // Academic year helpers
    // Current academic end year (e.g. 2027 for session 2026-27)
    const ACY = (() => {
      const s = parseInt(localStorage.getItem('academic_year') || '0');
      if (s > 2000) return s;
      const now = new Date();
      // If month >= June new session starts
      return now.getMonth() >= 5 ? now.getFullYear() + 1 : now.getFullYear();
    })();
    // DB year number -> display label
    function getBatchLabel(yearNum) {
      if (yearNum === 5 || yearNum === 'PASTOUT') return 'Passed Out';
      const dur = 4; // 4-year B.E. program
      const endYear = ACY - (4 - yearNum);
      return `Year ${yearNum} (${endYear - dur} - ${endYear})`;
    }
    const YEAR_OPTS = [1, 2, 3, 4, 'PASTOUT'];
    function yearSelect(id, includeAll = true, selected = '') {
      const all = includeAll ? `<option value="">All Years</option>` : '';
      return `<select id="${id}">${all}${YEAR_OPTS.map(y => `<option value="${y}" ${selected == y ? 'selected' : ''}>${getBatchLabel(y)}</option>`).join('')}</select>`;
    }

    // ── Utilities ────────────────────────────────────────────────────────────────

    async function api(method, url, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(API + url, opts);
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function toast(msg, type = 'ok') {
      const t = document.getElementById('toast');
      const el = document.createElement('div');
      el.className = 'toast-item' + (type === 'err' ? ' err' : type === 'warn' ? ' warn' : '');
      el.textContent = msg;
      t.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    function modal(html, large = false) {
      const bg = document.createElement('div');
      bg.className = 'modal-bg';
      bg.innerHTML = `<div class="modal${large ? ' modal-lg' : ''}">${html}</div>`;
      bg.onclick = e => { if (e.target === bg) bg.remove(); };
      document.getElementById('modal-container').appendChild(bg);
      return bg;
    }

    function closeModal() {
      document.querySelector('.modal-bg')?.remove();
    }

    function badge(text, forceType) {
      const map = {
        STUDENT: 'blue', STAFF: 'green', HOD: 'yellow', ADMIN: 'sky',
        IA1: 'blue', IA2: 'sky', SEMESTER: 'yellow',
        ACTIVE: 'green', INACTIVE: 'red', ALL: 'gray'
      };
      const type = forceType || map[text] || 'gray';
      return `<span class="badge badge-${type}">${text}</span>`;
    }

    function fmt(n) { return (n || 0).toLocaleString('en-IN'); }

    function dateStr(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function confirmModal(message, onConfirm) {
      const bg = modal(`
        <h3 style="font-size:15px">Confirm Action</h3>
        <p style="color:var(--text2);font-size:13px;margin-bottom:20px">${message}</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-danger" id="confirm-ok-btn">Confirm</button>
        </div>`);
      document.getElementById('confirm-ok-btn').onclick = () => { closeModal(); onConfirm(); };
    }

    function showSection(name) {
      currentSection = name;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const navEl = document.getElementById('nav-' + name);
      if (navEl) navEl.classList.add('active');

      const titles = {
        dashboard: 'Dashboard', students: 'Students', staff: 'Staff & HOD',
        subjects: 'Subjects', timetable: 'Timetable', exams: 'Exams',
        marks: 'Marks Entry', attendance: 'Attendance', fees: 'Fees Management',
        coding: 'Coding Scores', announce: 'Announcements', settings: 'Settings',
        defaulters: 'Defaulters Report'
      };
      document.getElementById('topbar-title').textContent = titles[name] || name;
      const el = document.getElementById('content');
      el.innerHTML = `<div style="color:var(--text3);padding:60px;text-align:center">
        <div class="spinner" style="margin:0 auto 12px"></div>Loading...
      </div>`;
      if (sections[name]) {
        sections[name]().catch(err => {
          el.innerHTML = `<div class="card" style="text-align:center;padding:40px">
            <div style="color:var(--danger);font-weight:700;margin-bottom:8px">Connection Error</div>
            <div style="color:var(--text3);font-size:13px">Make sure the backend server is running.<br><br>${err.message}</div>
          </div>`;
        });
      }
    }

    // ── DB Mode Badge ─────────────────────────────────────────────────────────────

    async function loadDbMode() {
      try {
        const data = await api('GET', '/api/admin/db-mode');
        const badge = document.getElementById('db-badge');
        const txt = document.getElementById('db-badge-text');
        badge.style.display = 'inline-flex';
        if (data.mode === 'turso') {
          badge.className = 'db-badge turso';
          txt.textContent = 'Turso Cloud';
        } else {
          badge.className = 'db-badge local';
          txt.textContent = 'Local SQLite';
        }
      } catch (e) { /* silent */ }
    }

    // ══════════════════════════════════════════════════════════════════════════════
    // DASHBOARD
    // ══════════════════════════════════════════════════════════════════════════════

    sections.dashboard = async () => {
      const [stats, dbMode] = await Promise.all([
        api('GET', '/api/admin/stats'),
        api('GET', '/api/admin/db-mode')
      ]);

      const dbInfo = dbMode.mode === 'turso'
        ? `<div class="info-box">Connected to <strong>Turso Cloud Database</strong>. All changes in this panel reflect on the live app immediately.</div>`
        : `<div class="warn-box">Connected to <strong>Local SQLite</strong>. Changes here do NOT appear on the live app. Go to Settings to check your Turso configuration.</div>`;

      document.getElementById('content').innerHTML = `
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
            <div class="stat-val">${stats.totalStudents}</div>
            <div class="stat-label">Students</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
            <div class="stat-val">${stats.totalStaff}</div>
            <div class="stat-label">Staff & HOD</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
            <div class="stat-val">${stats.totalSubjects}</div>
            <div class="stat-label">Subjects</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
            <div class="stat-val">${stats.totalExams}</div>
            <div class="stat-label">Exams</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:var(--warning-bg)"><svg viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
            <div class="stat-val text-warn">${stats.pendingFees}</div>
            <div class="stat-label">Pending Fees</div>
          </div>
        </div>

        <div class="card mb-4">${dbInfo}</div>

        <div class="card">
          <div class="card-title">Quick Reference</div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <div style="padding:12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text2);border:1px solid var(--border)">
              <strong style="color:var(--text1)">Students / Staff</strong> — Add users here. Default password = last 4 digits of roll number. Login on the Android app.
            </div>
            <div style="padding:12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text2);border:1px solid var(--border)">
              <strong style="color:var(--text1)">Subjects</strong> — Add all subjects with year and staff assignment before creating timetable or exams.
            </div>
            <div style="padding:12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text2);border:1px solid var(--border)">
              <strong style="color:var(--text1)">Timetable</strong> — Schedule periods per year. Publish immediately pushes to student and staff app.
            </div>
            <div style="padding:12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text2);border:1px solid var(--border)">
              <strong style="color:var(--text1)">Marks / Fees / Coding</strong> — Enter data here. Students see it read-only on the app.
            </div>
            <div style="padding:12px;background:var(--bg);border-radius:8px;font-size:13px;color:var(--text2);border:1px solid var(--border)">
              <strong style="color:var(--text1)">Publish to Live</strong> — Use the top-right button to push code changes to GitHub and trigger Render redeploy.
            </div>
          </div>
        </div>`;
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // STUDENTS
    // ══════════════════════════════════════════════════════════════════════════════

    let _allStudents = [];

    sections.students = async () => {
      const { users } = await api('GET', '/api/admin/users?role=STUDENT');
      _allStudents = users;
      renderStudentsView(users);
    };

    function renderStudentsView(users) {
      const byYear = {};
      users.forEach(u => { (byYear[u.year] = byYear[u.year] || []).push(u); });
      const years = Object.keys(byYear).sort((a,b) => parseInt(a)-parseInt(b));

      document.getElementById('content').innerHTML = `
        <div class="section-hd">
          <h2>Students <span style="color:var(--text3);font-size:14px;font-weight:500">(${users.length} total)</span></h2>
          <div class="section-hd-right">
            <button class="btn btn-ghost" onclick="document.getElementById('csv-upload-student').click()">Upload CSV</button>
            <input type="file" id="csv-upload-student" accept=".csv" style="display:none" onchange="handleCSVUpload(event, 'STUDENT')">
            <button class="btn btn-primary" onclick="addUserModal('STUDENT')">+ Add Student</button>
          </div>
        </div>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search by name or roll number..." oninput="filterStudents(this.value)" id="stu-search">
        </div>
        ${years.length === 0 ? '<div class="card" style="text-align:center;color:var(--text3);padding:40px">No students added yet.</div>' : `
        <div class="tabs">${years.map((y, i) => `<button class="tab ${i === 0 ? 'active' : ''}" onclick="switchStudentYear(${y})" id="stab-${y}">${getBatchLabel(parseInt(y) === 5 ? 'PASTOUT' : parseInt(y))} &nbsp;<span style="font-weight:500;opacity:.75">${byYear[y].length}</span></button>`).join('')}</div>
        ${years.map((y, i) => `
          <div id="stu-year-${y}" ${i > 0 ? 'class="hidden"' : ''}>
            <div class="card">
              <div class="table-wrap">
                <table id="stu-table-${y}">
                  <thead><tr><th>#</th><th>Name</th><th>Roll Number</th><th>Default Pass</th><th>Status</th><th>Actions</th></tr></thead>
                  <tbody>${renderStudentRows(byYear[y])}</tbody>
                </table>
              </div>
            </div>
          </div>`).join('')}`}`;
    }

    function renderStudentRows(students) {
      if (!students.length) return `<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:24px">No students found</td></tr>`;
      return students.map((u, idx) => `
        <tr>
          <td style="color:var(--text4)">${idx + 1}</td>
          <td class="fw-6">${u.name}</td>
          <td class="mono">${u.rollNo}</td>
          <td class="mono text-muted">${u.rollNo.slice(-4)}</td>
          <td>${u.isActive ? badge('ACTIVE', 'green') : badge('INACTIVE', 'red')}</td>
          <td>
            <div class="flex gap-2">
              <button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">Edit</button>
              <button class="btn ${u.isActive ? 'btn-warning' : 'btn-success'} btn-sm" onclick="toggleUser('${u.id}', ${u.isActive})">${u.isActive ? 'Disable' : 'Enable'}</button>
            </div>
          </td>
        </tr>`).join('');
    }

    window.switchStudentYear = (y) => {
      document.querySelectorAll('[id^="stu-year-"]').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('[id^="stab-"]').forEach(el => el.classList.remove('active'));
      document.getElementById(`stu-year-${y}`)?.classList.remove('hidden');
      document.getElementById(`stab-${y}`)?.classList.add('active');
    };

    window.filterStudents = (q) => {
      const filtered = _allStudents.filter(u =>
        u.name.toLowerCase().includes(q.toLowerCase()) ||
        u.rollNo.toLowerCase().includes(q.toLowerCase())
      );
      const byYear = {};
      filtered.forEach(u => { (byYear[u.year] = byYear[u.year] || []).push(u); });
      Object.keys(byYear).forEach(y => {
        const tbody = document.querySelector(`#stu-table-${y} tbody`);
        if (tbody) tbody.innerHTML = renderStudentRows(byYear[y]);
      });
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // STAFF & HOD
    // ══════════════════════════════════════════════════════════════════════════════

    let _allStaff = [];

    sections.staff = async () => {
      const [{ users: staff }, { users: hods }] = await Promise.all([
        api('GET', '/api/admin/users?role=STAFF'),
        api('GET', '/api/admin/users?role=HOD')
      ]);
      _allStaff = [...hods, ...staff];
      renderStaffView(_allStaff);
    };

    function renderStaffView(users) {
      document.getElementById('content').innerHTML = `
        <div class="section-hd">
          <h2>Staff & HOD <span style="color:var(--text3);font-size:14px;font-weight:500">(${users.length} total)</span></h2>
          <div class="flex gap-2">
            <button class="btn btn-ghost" onclick="addUserModal('HOD')">+ Add HOD</button>
            <button class="btn btn-primary" onclick="addUserModal('STAFF')">+ Add Staff</button>
          </div>
        </div>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Search by name or roll number..." oninput="filterStaff(this.value)">
        </div>
        <div class="card">
          <div class="table-wrap">
            <table id="staff-table">
              <thead><tr><th>#</th><th>Name</th><th>Roll Number</th><th>Role</th><th>Incharge Year</th><th>Default Pass</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>${renderStaffRows(users)}</tbody>
            </table>
          </div>
        </div>`;
    }

    function renderStaffRows(users) {
      if (!users.length) return `<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">No staff added yet</td></tr>`;
      return users.map((u, i) => `
        <tr>
          <td style="color:var(--text4)">${i + 1}</td>
          <td class="fw-6">${u.name}</td>
          <td class="mono">${u.rollNo}</td>
          <td>${badge(u.role)}</td>
          <td>${u.inchargeYear ? `Year ${u.inchargeYear}` : '<span style="color:var(--text4)">—</span>'}</td>
          <td class="mono text-muted">${u.rollNo.slice(-4)}</td>
          <td>${u.isActive ? badge('ACTIVE', 'green') : badge('INACTIVE', 'red')}</td>
          <td>
            <div class="flex gap-2">
              <button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">Edit</button>
              <button class="btn btn-ghost btn-sm" onclick="resetPass('${u.id}', '${u.rollNo}', '${u.name}', '${u.role}')">Reset Pass</button>
            </div>
          </td>
        </tr>`).join('');
    }

    window.filterStaff = (q) => {
      const filtered = _allStaff.filter(u =>
        u.name.toLowerCase().includes(q.toLowerCase()) ||
        u.rollNo.toLowerCase().includes(q.toLowerCase())
      );
      const tbody = document.querySelector('#staff-table tbody');
      if (tbody) tbody.innerHTML = renderStaffRows(filtered);
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // USER MODALS (shared add/edit)
    // ══════════════════════════════════════════════════════════════════════════════

    window.addUserModal = (role) => {
      const isStudent = role === 'STUDENT';
      const isHOD = role === 'HOD';
      modal(`
        <h3>Add ${role}</h3>
        <div class="form-grid">
          <div class="form-group"><label>Full Name</label><input id="u-name" placeholder="e.g. Arjun Kumar"></div>
          <div class="form-group"><label>Roll Number</label><input id="u-roll" placeholder="e.g. 410123205040"></div>
          ${isStudent ? `<div class="form-group"><label>Year / Batch</label><select id="u-year">${YEAR_OPTS.map(y => `<option value="${y === 'PASTOUT' ? 5 : y}">${getBatchLabel(y)}</option>`).join('')}</select></div>` : ''}
          ${isHOD ? `<div class="form-group"><label>Incharge Year</label><select id="u-incharge"><option value="">None</option>${[1,2,3,4].map(y => `<option value="${y}">${getBatchLabel(y)}</option>`).join('')}</select></div>` : ''}
        </div>
        <div class="info-box mt-4">Default password will be the <strong>last 4 digits of the roll number</strong>. The user changes it from the app after first login.</div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="submitAddUser('${role}')">Add ${role}</button>
        </div>`);
    };

    window.submitAddUser = async (role) => {
      const name = document.getElementById('u-name').value.trim();
      const rollNo = document.getElementById('u-roll').value.trim();
      const year = document.getElementById('u-year')?.value;
      const inchargeYear = document.getElementById('u-incharge')?.value;
      if (!name || !rollNo) return toast('Name and roll number are required', 'err');

      try {
        const res = await api('POST', '/api/admin/users', {
          name, rollNo, role,
          year: year ? parseInt(year) : null,
          inchargeYear: inchargeYear ? parseInt(inchargeYear) : null
        });
        toast(`${role} added. Default password: ${res.defaultPassword}`);
        closeModal();
        showSection(role === 'STUDENT' ? 'students' : 'staff');
      } catch (e) { toast(e.message, 'err'); }
    };

    window.handleCSVUpload = (e, role) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const text = ev.target.result;
        const lines = text.split('\n').filter(l => l.trim().length > 0);
        if (lines.length < 2) return toast('CSV is empty or invalid', 'err');
        
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
        
        const nameIdx = headers.findIndex(h => h.includes('name'));
        const rollIdx = headers.findIndex(h => h.includes('reg no') || h.includes('roll'));
        const yearIdx = headers.findIndex(h => h === 'year');
        const deptIdx = headers.findIndex(h => h.includes('branch') || h.includes('dept'));
        
        if (nameIdx === -1 || rollIdx === -1) {
          return toast('CSV must contain Name and Reg No / Roll columns', 'err');
        }
        
        const users = [];
        for (let i = 1; i < lines.length; i++) {
          const row = lines[i].split(',');
          if (row.length <= Math.max(nameIdx, rollIdx)) continue;
          
          users.push({
            name: row[nameIdx].trim(),
            rollNo: row[rollIdx].trim(),
            role: role,
            year: yearIdx !== -1 && row[yearIdx] ? parseInt(row[yearIdx].trim()) : null,
            department: deptIdx !== -1 && row[deptIdx] ? row[deptIdx].trim() : 'IT'
          });
        }
        
        if (!users.length) return toast('No valid users found in CSV', 'err');
        
        try {
          toast(`Uploading ${users.length} users...`);
          const res = await api('POST', '/api/admin/users/bulk', { users });
          toast(`Added ${res.added} users. Skipped ${res.skipped}.`);
          showSection(role === 'STUDENT' ? 'students' : 'staff');
        } catch (err) {
          toast(err.message, 'err');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    };

    window.editUser = async (id) => {
      const { users } = await api('GET', '/api/admin/users');
      const u = users.find(u => u.id === id);
      if (!u) return toast('User not found', 'err');

      modal(`
        <h3>Edit User</h3>
        <div class="form-grid">
          <div class="form-group"><label>Full Name</label><input id="eu-name" value="${u.name}"></div>
          <div class="form-group"><label>Roll Number</label><input id="eu-roll" value="${u.rollNo}"></div>
          <div class="form-group"><label>Role</label>
            <select id="eu-role">
              ${['STUDENT', 'STAFF', 'HOD', 'ADMIN'].map(r => `<option value="${r}" ${u.role === r ? 'selected' : ''}>${r}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Year / Batch</label>
            <select id="eu-year">
              <option value="">—</option>
              ${YEAR_OPTS.map(y => `<option value="${y === 'PASTOUT' ? 5 : y}" ${u.year == (y === 'PASTOUT' ? 5 : y) ? 'selected' : ''}>${getBatchLabel(y)}</option>`).join('')}
            </select>
          </div>

    window.editSubjectModal = async (id) => {

    sections.timetable = async () => {
      const settings = await api('GET', '/api/admin/settings');
      const ttConfig = settings.timetable_config || { periods: 8, breakAfter: [2, 5, 6] };

      document.getElementById('content').innerHTML = `
        <div class="section-hd"><h2>Timetable Scheduler</h2></div>
        <div class="card mb-4">
          <div class="card-title">Period Settings</div>
          <div class="form-grid mb-4">
            <div class="form-group">
              <label>Total Periods Per Day</label>
              <input type="number" id="tt-periods" value="${ttConfig.periods}" min="1" max="12">
            </div>
            <div class="form-group">
              <label>Break / Lunch After Period (comma-separated)</label>
              <input type="text" id="tt-breaks" value="${(ttConfig.breakAfter || []).join(',')}" placeholder="e.g. 2,5,6">
            </div>
          </div>
          <button class="btn btn-ghost" onclick="saveTTConfig()">Save Period Settings</button>
        </div>
        <div class="card">
          <div class="card-title">Schedule Per Year</div>
          <div class="form-grid mb-4">
            <div class="form-group">
              <label>Select Year</label>
              <select id="tt-year-sel" onchange="loadTTEditor()">
                <option value="">— Select Year —</option>
                ${[1,2,3,4].map(y => `<option value="${y}">${getBatchLabel(y)}</option>`).join('')}
              </select>
            </div>
          </div>
          <div id="tt-editor"></div>
        </div>`;
    };

    window.saveTTConfig = async () => {
      const periods = parseInt(document.getElementById('tt-periods').value);
      const breaks = document.getElementById('tt-breaks').value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      try {
        await api('PUT', '/api/admin/settings', { key: 'timetable_config', value: { periods, breakAfter: breaks } });
        toast('Period settings saved');
      } catch (e) { toast(e.message, 'err'); }
    };

    window.loadTTEditor = async () => {
      const year = document.getElementById('tt-year-sel').value;
      if (!year) return;
      document.getElementById('tt-editor').innerHTML = `<div style="color:var(--text3);padding:20px 0">Loading...</div>`;

      const settings = await api('GET', '/api/admin/settings');
      const ttConfig = settings.timetable_config || { periods: 8, breakAfter: [] };
      const periods = ttConfig.periods || 8;
      const breakAfter = ttConfig.breakAfter || [];

      const { subjects } = await api('GET', `/api/admin/subjects?year=${year}`);
      const existing = await api('GET', `/api/admin/timetable/${year}`);
      const existingConfig = existing.timetable?.config || {};

      const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const cols = Math.min(periods, 9);

      let rows = days.map(day => {
        const cells = Array.from({ length: periods }, (_, i) => {
          const p = i + 1;
          const val = existingConfig[day]?.[i] || '';
          const isBreak = breakAfter.includes(p);
          return `<div class="tt-period-cell">
            <div class="tt-period-label">P${p}</div>
            <select id="tt-${day}-${p}" style="font-size:11px;padding:5px 4px">
              <option value="">—</option>
              ${isBreak ? `<option value="BREAK" ${val === 'BREAK' ? 'selected' : ''}>BREAK</option><option value="LUNCH" ${val === 'LUNCH' ? 'selected' : ''}>LUNCH</option>` : ''}
              ${subjects.map(s => `<option value="${s.code}" ${val === s.code ? 'selected' : ''}>${s.code}</option>`).join('')}
            </select>
          </div>`;
        }).join('');
        return `<div class="tt-day-row">
          <div class="tt-day-label">${day}</div>
          <div class="tt-periods-grid" style="grid-template-columns:repeat(${cols},1fr)">${cells}</div>
        </div>`;
      }).join('');

      document.getElementById('tt-editor').innerHTML = `
        <div style="font-size:13px;font-weight:700;color:var(--text1);margin-bottom:14px">Year ${year} — ${periods} Periods / Day</div>
        ${rows}
        <button class="btn btn-primary mt-4" onclick="submitTimetable(${year})">Save & Publish to App</button>`;
    };

    window.submitTimetable = async (year) => {
      const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const settings = await api('GET', '/api/admin/settings');
      const periods = settings.timetable_config?.periods || 8;
      const config = {};
      days.forEach(day => {
        config[day] = Array.from({ length: periods }, (_, i) =>
          document.getElementById(`tt-${day}-${i + 1}`)?.value || ''
        );
      });
      try {
        await api('POST', `/api/admin/timetable/${year}`, { config });
        toast(`Year ${year} timetable published. Students notified.`);
      } catch (e) { toast(e.message, 'err'); }
    };

    window.loadMarksEditor = async () => {
      const sel = document.getElementById('marks-exam-sel');

      const year = sel.selectedOptions[0].dataset.year;
      const maxMarks = sel.selectedOptions[0].dataset.max;

      const [{ users: students }, { marks }] = await Promise.all([
        api('GET', `/api/admin/users?role=STUDENT&year=${year}`),
        api('GET', `/api/admin/marks/${examId}`)
      ]);
      const marksMap = {};
      marks.forEach(m => { marksMap[m.studentId] = m.marks; });

      document.getElementById('marks-editor').innerHTML = `
        <div class="card">
          <div class="section-hd">

                  <tr>
                    <td class="mono">${s.rollNo}</td>
                    <td class="fw-6">${s.name}</td>

                    <td style="color:var(--text3)">${maxMarks}</td>
                  </tr>`).join('')}
              </tbody>
            </table>

      const entries = studentIds

        await api('POST', `/api/admin/marks/${examId}`, { entries });

    window.viewAttModal = async (attId, year) => {
      const [attRes, { users: students }] = await Promise.all([
        api('GET', `/api/admin/attendance?`).then(r => r.attendance?.find(a => a.id === attId) || null),
        api('GET', `/api/admin/users?role=STUDENT&year=${year}`)

      const yearVal = document.getElementById('att-year')?.value || year;
      const dateVal = document.getElementById('att-date')?.value || '';
      const allAtt = await api('GET', `/api/admin/attendance?year=${year}&date=${dateVal}`);
      const rec = allAtt.attendance.find(a => a.id === attId);
      if (!rec) return toast('Record not found', 'err');

      const presentIds = JSON.parse(rec.presentIds || '[]');
      const absentIds = JSON.parse(rec.absentIds || '[]');

      const rows = students.map(s => {
        const isPresent = presentIds.includes(s.id);
        return `<tr>
          <td class="mono" style="font-size:12px">${s.rollNo}</td>
          <td class="fw-6">${s.name}</td>
          <td>

            </div>
          </div>
          <button class="btn btn-primary" onclick="saveSettings()">Save Timetable Config</button>
        </div>

        <!-- Academic Year Config -->
        <div class="card mb-4">
          <div class="card-title">Academic Year</div>
          <div class="form-grid mb-4">
            <div class="form-group">
              <label>Current Academic End Year (e.g. 2027 for session 2026-27)</label>
              <input type="number" id="s-acy" value="${parseInt(localStorage.getItem('academic_year') || ACY)}" min="2020" max="2040">
            </div>
          </div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Batch labels across the panel are computed from this. Current: Year 4 = ${getBatchLabel(4)}</div>
          <button class="btn btn-primary" onclick="saveAcademicYear()">Save Academic Year</button>
        </div>

        <!-- Batch Promotion -->
        <div class="card mb-4">
          <div class="card-title">Year-End Batch Promotion</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:14px">Promotes all students to the next year at the end of the academic year. Year 1 → 2, Year 2 → 3, Year 3 → 4, Year 4 → Passed Out. This action cannot be undone.</div>
          <div class="warn-box mb-4">Run this only once per academic year, after all exams are complete.</div>
          <button class="btn btn-danger" onclick="promoteStudents()">Promote All Students</button>
        </div>

        <!-- Admin Credentials -->
        <div class="card">
          <div class="card-title">Admin Credentials</div>
          <div style="font-size:13px;color:var(--text2);display:flex;flex-direction:column;gap:8px">
            <div>Admin Roll: <span class="mono fw-6">ADMIN001</span></div>
            <div>Admin Password: <span class="mono fw-6">2005</span></div>
            <div>Live App URL: <a href="https://adhi-it.onrender.com" target="_blank" style="color:var(--accent)">https://adhi-it.onrender.com</a></div>
          </div>
        </div>`;
    };

    window.saveRenderHook = () => {
      const url = document.getElementById('render-hook').value.trim();
      if (!url) return toast('Paste the deploy hook URL first', 'err');
      localStorage.setItem(RENDER_HOOK_KEY, url);
      toast('Render deploy hook saved to browser');
      sections.settings();
    };

    window.clearRenderHook = () => {
      localStorage.removeItem(RENDER_HOOK_KEY);
      toast('Render hook cleared');
      sections.settings();
    };

    window.saveSettings = async () => {
      const periods = parseInt(document.getElementById('s-periods').value);
      const breaks = document.getElementById('s-breaks').value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      try {
        await api('PUT', '/api/admin/settings', { key: 'timetable_config', value: { periods, breakAfter: breaks } });
        toast('Timetable config saved');
      } catch (e) { toast(e.message, 'err'); }
    };

    window.saveAcademicYear = () => {
      const val = parseInt(document.getElementById('s-acy').value);
      if (!val || val < 2020) return toast('Enter a valid year (e.g. 2027)', 'err');
      localStorage.setItem('academic_year', val);
      toast('Academic year saved. Reload the page to apply new batch labels.');
    };

    window.promoteStudents = () => {
      confirmModal('This will promote ALL students to the next year. Year 4 students will become Passed Out. This cannot be undone. Proceed?', async () => {
        try {
          const r = await api('POST', '/api/admin/promote-students', {});
          toast(`Batch promotion complete. ${r.promoted} active students updated.`);
          sections.settings();
        } catch (e) { toast(e.message, 'err'); }
      });
    };

    // ══════════════════════════════════════════════════════════════════════════════
    // PUBLISH TO LIVE
    // ══════════════════════════════════════════════════════════════════════════════

    window.publishToLive = () => {
      const hookUrl = localStorage.getItem(RENDER_HOOK_KEY) || '';
      const ts = new Date().toISOString().slice(0, 16).replace('T', ' ');

      modal(`
        <h3>Publish to Live</h3>
        <div class="info-box mb-4">This will push all code changes to GitHub and trigger a Render redeploy. Database data is already live (it goes via Turso directly).</div>
        <div class="form-group mb-4">
          <label>Commit Message</label>
          <input id="pub-msg" value="Admin update ${ts}">
        </div>
        ${!hookUrl ? `<div class="warn-box mb-4">No Render deploy hook set. Go to Settings to add it. Git push will still work but Render redeploy must trigger automatically via GitHub.</div>` : ''}
        <div id="pub-steps">
          <div class="deploy-step" id="step-git">
            <div class="step-icon step-pending" id="step-git-icon">1</div>
            <div>
              <div class="fw-6" style="font-size:13px">Push code to GitHub</div>
              <div id="step-git-msg" style="font-size:12px;color:var(--text3);margin-top:2px">Ready</div>
            </div>
          </div>
          <div class="deploy-step" id="step-render">
            <div class="step-icon step-pending" id="step-render-icon">2</div>
            <div>
              <div class="fw-6" style="font-size:13px">Trigger Render redeploy</div>
              <div id="step-render-msg" style="font-size:12px;color:var(--text3);margin-top:2px">${hookUrl ? 'Ready' : 'No hook URL — Render will auto-deploy from GitHub'}</div>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="pub-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn btn-publish" id="pub-go" onclick="runPublish()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            Publish Now
          </button>
        </div>`);
    };

    window.runPublish = async () => {
      const msg = document.getElementById('pub-msg').value.trim() || 'Admin update';
      const hookUrl = localStorage.getItem(RENDER_HOOK_KEY) || '';

      document.getElementById('pub-go').disabled = true;
      document.getElementById('pub-cancel').disabled = true;

      // Step 1
      document.getElementById('step-git-icon').className = 'step-icon step-running';
      document.getElementById('step-git-icon').innerHTML = '<div class="spinner"></div>';
      document.getElementById('step-git-msg').textContent = 'Running git push...';

      try {
        const res = await api('POST', '/api/admin/deploy', { message: msg, renderHookUrl: hookUrl || undefined });

        document.getElementById('step-git-icon').className = 'step-icon step-done';
        document.getElementById('step-git-icon').textContent = '✓';
        document.getElementById('step-git-msg').textContent = res.gitMsg || 'Done';

        // Step 2
        document.getElementById('step-render-icon').className = 'step-icon step-done';
        document.getElementById('step-render-icon').textContent = hookUrl ? '✓' : '—';
        document.getElementById('step-render-msg').textContent = res.renderMsg || 'Triggered';

        document.getElementById('pub-cancel').disabled = false;
        document.getElementById('pub-cancel').textContent = 'Close';
        toast('Published successfully');
      } catch (e) {
        document.getElementById('step-git-icon').className = 'step-icon step-error';
        document.getElementById('step-git-icon').textContent = '!';
        document.getElementById('step-git-msg').textContent = e.message;
        document.getElementById('pub-go').disabled = false;
        document.getElementById('pub-cancel').disabled = false;
        toast(e.message, 'err');
      }
    };

    // ── Init ──────────────────────────────────────────────────────────────────────

    loadDbMode();
    showSection('dashboard');

    // Notification permission prompt
    (function askNotifPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'granted' || Notification.permission === 'denied') return;
      // Small delay to not block initial render
      setTimeout(() => {
        const bg = document.createElement('div');
        bg.className = 'modal-bg';
        bg.innerHTML = `
          <div class="modal" style="max-width:420px">
            <h3 style="font-size:15px;margin-bottom:10px">Enable Notifications</h3>
            <p style="color:var(--text2);font-size:13px;margin-bottom:18px">Allow browser notifications to receive real-time alerts for attendance, announcements, and system events. Chrome may block them if you skip this step.</p>
            <div class="modal-actions">
              <button class="btn btn-ghost" id="notif-skip">Skip</button>
              <button class="btn btn-primary" id="notif-allow">Enable Notifications</button>
            </div>
          </div>`;
        document.getElementById('modal-container').appendChild(bg);
        document.getElementById('notif-skip').onclick = () => bg.remove();
        document.getElementById('notif-allow').onclick = () => {
          Notification.requestPermission().then(p => {
            bg.remove();
            if (p === 'granted') toast('Notifications enabled');
            else toast('Notifications blocked. Check browser site settings.', 'warn');
          });
        };
      }, 1500);
    })();
  </script>

</body>
</html>
